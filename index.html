<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amour ya Fati | Home</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

<header class="navbar">
    <div class="container navbar-inner"></div>
<!--    logo lagayaa-->
    <a href="#" class="logo-link">
        <div class="logo-icon-wrap">
            <i data-lucide="trending-up" style="width:20px;height:20px;"></i>
        </div>
        <h1 class="logo-text text-invert">
            virtual <span>trade</span>
        </h1>
    </a>


</header>

<div>
    <div class="section-header">
        <h2 class="section-title">Live Market</h2>
        <span class="live-dot" title="Live">
                        <span class="ping"></span>
                        <span class="dot"></span>
                    </span>
    </div></div>
<div class="panel panel-fixed-height">
    <!-- search and sort -->
    <div class="search-sort">
        <div class="search-wrap">
            <i data-lucide="search"></i>
            <input type="text" placeholder="Search stocks..." class="input-field">
        </div>
        <div class="select-wrap">
            <select class="select-field">
                <option>Sort: Default</option>
                <option>Price: High → Low</option>
                <option>Price: Low → High</option>
                <option>Change: Top Gainers</option>
                <option>Change: Top Losers</option>
            </select>
            <i data-lucide="chevron-down"></i>
        </div>
    </div></div>
<!-- watchlist -->
<div class="watchlist">
    <!-- active Stock -->
    <div class="wl-item active">
        <div>
            <h4 class="wl-name">RELIANCE</h4>
            <p class="wl-company">Reliance Industries</p>
        </div>
        <div>
            <p class="wl-price up font-mono">₹2,950.45</p>
            <p class="wl-change up">▲ +1.25%</p>
        </div>
    </div>
    <!-- tcs=-->
    <div class="wl-item">
        <div>
            <h4 class="wl-name">TCS</h4>
            <p class="wl-company">Tata Consultancy</p>
        </div>
        <div>
            <p class="wl-price down font-mono">₹4,120.80</p>
            <p class="wl-change down">▼ -0.45%</p>
        </div>
    </div>






<!--flowbite script-->

<!--custom style-->
<script src="style.js"></script></div>
</body>
</html>
