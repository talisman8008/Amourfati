<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtualTrade — Premium Stock Trading Dashboard</title>
    <meta name="description"
          content="A premium virtual stock trading dashboard for Indian markets. Practice trading with real-time prices in Indian Rupees.">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
            rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ════════════════════════════════════════════════
     NAVBAR
     ════════════════════════════════════════════════ -->
<header class="navbar">
    <div class="container navbar-inner">

        <!-- Logo -->
        <a href="#" class="logo-link">
            <div class="logo-icon-wrap">
                <i data-lucide="trending-up" style="width:20px;height:20px;"></i>
            </div>
            <h1 class="logo-text text-invert">
                Virtual<span>Trade</span>
            </h1>
        </a>

        <!-- Right Actions -->
        <div class="nav-actions">
            <!-- Reset Portfolio -->
            <button id="btn-reset" class="btn-reset">
                <i data-lucide="rotate-ccw" style="width:14px;height:14px;"></i>
                Reset
            </button>

            <!-- Volatility Slider -->
            <div class="volatility-wrap">
                <div class="vol-header">
                    <i data-lucide="gauge"></i>
                    <span class="vol-label">Volatility</span>
                    <input type="range" min="1" max="3" step="1" value="1" id="volatility-slider" class="vol-range">
                </div>
                <div class="vol-labels">
                    <span>Low</span>
                    <span>Med</span>
                    <span>High</span>
                </div>
            </div>

            <!-- Theme Toggle -->
            <button id="btn-theme" class="btn-theme" aria-label="Toggle theme">
                <i data-lucide="moon" class="icon-moon" style="width:20px;height:20px;"></i>
                <i data-lucide="sun" class="icon-sun" style="width:20px;height:20px;"></i>
            </button>

            <!-- User Avatar -->
            <div class="avatar">
                <span>OD</span>
            </div>
        </div>
    </div>
</header>
