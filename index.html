<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amour ya Fati | Home</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>
<body>

<header class="navbar">
    <div class="container navbar-inner">
        <!-- Logo -->
        <a href="#" class="logo-link">
            <div class="logo-icon-wrap">
                <i data-lucide="trending-up" style="width:20px;height:20px;"></i>
            </div>
            <h1 class="logo-text text-invert">
                Virtual<span>Trade</span>
            </h1>
        </a>

        <!-- Right Actions -->
        <div class="nav-actions">
            <!-- Reset Portfolio -->
            <button id="btn-reset" class="btn-reset">
                <i data-lucide="rotate-ccw" style="width:14px;height:14px;"></i>
                Reset
            </button>

            <!-- Volatility Slider -->
            <div class="volatility-wrap">
                <div class="vol-header">
                    <i data-lucide="gauge"></i>
                    <span class="vol-label">Volatility</span>
                    <input type="range" min="1" max="3" step="1" value="1" id="volatility-slider" class="vol-range">
                </div>
                <div class="vol-labels">
                    <span>Low</span>
                    <span>Med</span>
                    <span>High</span>
                </div>
            </div>

            <!-- Theme Toggle -->
            <button id="btn-theme" class="btn-theme" aria-label="Toggle theme">
                <i data-lucide="moon" class="icon-moon" style="width:20px;height:20px;"></i>
                <i data-lucide="sun" class="icon-sun" style="width:20px;height:20px;"></i>
            </button>

            <!-- User Avatar -->
            <div class="avatar">
                <span>OD</span>
            </div>
        </div>
    </div>
</header>
<!--MAIN TRADING -->

<div>
    <div class="section-header">
        <h2 class="section-title">Live Market</h2>
        <span class="live-dot" title="Live">
                        <span class="ping"></span>
                        <span class="dot"></span>
                    </span>
    </div>


    <!-- Watchlist -->
    <div class="watchlist">
        <!-- Active Stock -->
        <div class="wl-item active">
            <div>
                <h4 class="wl-name">RELIANCE</h4>
                <p class="wl-company">Reliance Industries</p>
            </div>
            <div>
                <p class="wl-price up font-mono">₹2,950.45</p>
                <p class="wl-change up">▲ +1.25%</p>
            </div>
        </div>
        <!-- TCS -->
        <div class="wl-item">
            <div>
                <h4 class="wl-name">TCS</h4>
                <p class="wl-company">Tata Consultancy</p>
            </div>
            <div>
                <p class="wl-price down font-mono">₹4,120.80</p>
                <p class="wl-change down">▼ -0.45%</p>
            </div>
        </div>
        ass="wl-name">ITC</h4>
        <p class="wl-company">ITC Ltd</p>
    </div>
    <div>
        <p class="wl-price down font-mono">₹415.10</p>
        <p class="wl-change down">▼ -1.12%</p>
    </div>
</div>
<!-- WIPRO -->
<div class="wl-item">
    <div>
        <h4 class="wl-name">WIPRO</h4>
        <p class="wl-company">Wipro Ltd</p>
    </div>
    <div>
        <p class="wl-price up font-mono">₹462.35</p>
        <p class="wl-change up">▲ +2.10%</p>
    </div>
</div>
<!-- SBIN -->
<div class="wl-item">
    <div>
        <h4 class="wl-name">SBIN</h4>
        <p class="wl-company">State Bank of India</p>
    </div>
    <div>
        <p class="wl-price down font-mono">₹752.90</p>
        <p class="wl-change down">▼ -0.32%</p>
    </div>
</div>
</div>
</div>
</div>






<!--flowbite script-->

<!--custom style-->
<script src="style.js"></script>
</body>
</html>
