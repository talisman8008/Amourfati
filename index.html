<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VirtualTrade | Login</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Login Specific Add-ons */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent 40%),
      radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), transparent 40%);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      border-radius: 24px;
      text-align: center;
      position: relative;
      z-index: 10;
    }
    .login-input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .login-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .login-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #1e293b;
      background: rgba(2, 6, 23, 0.5);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: #10b981; }
    .login-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      background: #10b981;
      color: #022c22;
      font-size: 16px;
      font-weight: 800;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3); }
    .social-login {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .btn-social {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #1e293b;
      background: transparent;
      color: #cbd5e1;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .btn-social:hover { background: #1e293b; }
  </style>
</head>
<body>

<div class="login-card panel">
  <div class="logo-icon-wrap" style="margin: 0 auto 20px auto; width: 48px; height: 48px;">
    <i data-lucide="trending-up" style="width:24px;height:24px;"></i>
  </div>
  <h1 class="logo-text text-invert" style="font-size: 28px; margin-bottom: 8px;">
    Virtual<span>Trade</span>
  </h1>
  <p style="color: #64748b; font-size: 14px; margin-bottom: 32px;">Sign in to your trading terminal</p>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="login-input-group">
      <label class="login-label">Email Address</label>
      <input type="email" class="login-input" placeholder="trader@example.com" required>
    </div>
    <div class="login-input-group">
      <label class="login-label">Password</label>
      <input type="password" class="login-input" placeholder="••••••••" required>
    </div>

    <button type="submit" class="login-btn">Access Terminal</button>
  </form>

  <div style="margin-top: 24px; display: flex; align-items: center; gap: 12px; color: #475569; font-size: 12px;">
    <div style="flex:1; height:1px; background:#1e293b;"></div>
    OR CONTINUE WITH
    <div style="flex:1; height:1px; background:#1e293b;"></div>
  </div>

  <div class="social-login">
    <button class="btn-social">
      <i data-lucide="github" style="width:16px;height:16px;"></i> GitHub
    </button>
    <button class="btn-social">
      <i data-lucide="chrome" style="width:16px;height:16px;"></i> Google
    </button>
  </div>
</div>

<script>
  lucide.createIcons();
  function handleLogin(e) {
    e.preventDefault();
    // Fake loading effect before redirect
    const btn = document.querySelector('.login-btn');
    btn.innerHTML = '<i data-lucide="loader" class="spin" style="width:20px;height:20px;margin:auto;"></i>';
    lucide.createIcons();

    setTimeout(() => {
      window.location.href = 'index.html';
    }, 800); // Redirects to your main dashboard after 0.8s
  }
</script>
</body>
</html>
